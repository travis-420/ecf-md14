likelihood:
  planck_2018_highl_plik.TTTEEE_lite_native:
  bao.desi_dr2:            # if name errors: run `cobaya-doc bao` and use the DR2 entry
  sn.pantheonplus:
prior:
  tau_prior: "lambda tau: -0.5*((tau-0.0544)/0.0073)**2"   # replaces low-l EE (clik-free path)
params:
  logA: {prior: {min: 2.9, max: 3.2}, ref: 3.044, proposal: 0.002, latex: \log A_s, drop: true}
  As: {value: "lambda logA: 1e-10*np.exp(logA)"}
  ns: {prior: {min: 0.92, max: 1.01}, ref: 0.965, proposal: 0.003}
  H0: {prior: {min: 60, max: 76}, ref: 67.7, proposal: 0.3}
  ombh2: {prior: {min: 0.020, max: 0.024}, ref: 0.02237, proposal: 0.0001}
  omch2: {prior: {min: 0.10, max: 0.14}, ref: 0.1195, proposal: 0.0008}
  tau: {prior: {min: 0.02, max: 0.10}, ref: 0.0544, proposal: 0.005}
  A_planck: {prior: {dist: norm, loc: 1, scale: 0.0025}, ref: 1, proposal: 0.002}
  tau_ecf: {prior: {min: 0.3, max: 6.0}, ref: 2.1, proposal: 0.15, latex: '\tau_{\rm ECF}'}
theory:
  ecf_theory_cobaya.ECFCAMB:
    python_path: .
    extra_args: {halofit_version: mead, num_massive_neutrinos: 1, mnu: 0.06}
sampler:
  mcmc: {Rminus1_stop: 0.02, max_tries: 1000}
output: chains/ecf
